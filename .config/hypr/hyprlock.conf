general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
    fail_timeout = 1500
}

background {
    monitor =
    path = ~/.dotfiles/wallpapers/room-edited.jpeg

    blur_passes = 3
    blur_size = 6

    noise = 0.0117
    contrast = 1.15
    brightness = 0.80
    vibrancy = 0.10
    vibrancy_darkness = 0.0
}

# -------------------------------------------------
# CLOCK
# -------------------------------------------------

label {
    monitor =

    text = $TIME

    color = rgba(d6d2c4ff)

    font_size = 96
    font_family = FantasqueSansM Nerd Font Mono

    position = 0, 180

    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 3
}

# -------------------------------------------------
# DATE
# -------------------------------------------------

label {
    monitor =

    text = cmd[update:1000] date "+%A · %d %B %Y"

    color = rgba(9f998dff)

    font_size = 22
    font_family = FantasqueSansM Nerd Font Mono

    position = 0, 105

    halign = center
    valign = center
}

# -------------------------------------------------
# USER
# -------------------------------------------------

label {
    monitor =

    text = 󰀄  $USER

    color = rgba(c9b68dff)

    font_size = 20
    font_family = FantasqueSansM Nerd Font Mono

    position = 0, -80

    halign = center
    valign = center
}

# -------------------------------------------------
# PASSWORD FIELD
# -------------------------------------------------

input-field {
    monitor =

    size = 340, 60

    outline_thickness = 2

    dots_size = 0.22
    dots_spacing = 0.20

    dots_center = true

    fade_on_empty = false

    hide_input = false

    position = 0, -150

    halign = center
    valign = center

    outer_color = rgba(b08d57ff)
    inner_color = rgba(171b24ee)

    check_color = rgba(7d9571ff)
    fail_color = rgba(a55d68ff)

    font_color = rgba(d6d2c4ff)

    rounding = 12

    placeholder_text = Enter Case Key...

    font_family = FantasqueSansM Nerd Font Mono
}

# -------------------------------------------------
# CASE STATUS
# -------------------------------------------------

label {
    monitor =

    text = Intelligence Workstation Locked

    color = rgba(7c92b3ff)

    font_size = 16
    font_family = FantasqueSansM Nerd Font Mono

    position = 0, -235

    halign = center
    valign = center
}

# -------------------------------------------------
# FAILED ATTEMPTS
# -------------------------------------------------

label {
    monitor =

    text = $FAIL

    color = rgba(a55d68ff)

    font_size = 14
    font_family = FantasqueSansM Nerd Font Mono

    position = 0, -300

    halign = center
    valign = center
}
